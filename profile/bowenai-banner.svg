<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>

    <!-- Logo / Brand Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Abstract Background Elements -->
  <!-- Grid pattern -->
  <g opacity="0.08">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="200" cy="100" r="180" fill="#4F46E5" opacity="0.15" filter="url(#glow)" />
  <circle cx="1000" cy="300" r="220" fill="#EC4899" opacity="0.12" filter="url(#glow)" />
  <circle cx="600" cy="200" r="120" fill="#3B82F6" opacity="0.1" filter="url(#glow)" />

  <!-- Connected Nodes/Neurons representing AI -->
  <g stroke="#4F46E5" stroke-width="1.5" opacity="0.3">
    <line x1="150" y1="200" x2="250" y2="120" />
    <line x1="250" y1="120" x2="350" y2="250" />
    <line x1="350" y1="250" x2="200" y2="300" />
    <line x1="200" y1="300" x2="150" y2="200" />
    <line x1="250" y1="120" x2="200" y2="300" />
  </g>
  <g fill="#7C3AED" opacity="0.6">
    <circle cx="150" cy="200" r="6" />
    <circle cx="250" cy="120" r="8" fill="url(#primaryGrad)" />
    <circle cx="350" cy="250" r="5" />
    <circle cx="200" cy="300" r="7" />
  </g>

  <g stroke="#EC4899" stroke-width="1.5" opacity="0.25">
    <line x1="950" y1="100" x2="1050" y2="180" />
    <line x1="1050" y1="180" x2="1000" y2="280" />
    <line x1="1000" y1="280" x2="900" y2="200" />
    <line x1="900" y1="200" x2="950" y2="100" />
  </g>
  <g fill="#EC4899" opacity="0.6">
    <circle cx="950" cy="100" r="5" />
    <circle cx="1050" cy="180" r="6" />
    <circle cx="1000" cy="280" r="8" fill="url(#primaryGrad)" />
    <circle cx="900" cy="200" r="5" />
  </g>

  <!-- Large Monogram 'B' in background -->
  <text x="600" y="270" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="280" font-weight="900" fill="#ffffff" opacity="0.03" text-anchor="middle">B</text>

  <!-- Brand Typography -->
  <!-- Main Title -->
  <text x="600" y="190" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="76" font-weight="800" fill="url(#primaryGrad)" text-anchor="middle" letter-spacing="2">
    BowenAI
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="240" font-family="'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#94A3B8" text-anchor="middle" letter-spacing="4">
    INTELLIGENT SOLUTIONS FOR REAL-WORLD IMPACT
  </text>

  <!-- Decorative line underneath -->
  <rect x="500" y="270" width="200" height="3" rx="1.5" fill="url(#primaryGrad)" />

  <!-- Animated-like circles/nodes for modern technical look -->
  <circle cx="600" cy="271.5" r="5" fill="#EC4899" />
</svg>
