name: Update Org Profile README

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch:

jobs:
  update-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Generate repo list
        uses: actions/github-script@v7
        id: get-repos
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const org = "BowenAI";
            const per_page = 100;
            let page = 1;
            let repos = [];
            while (true) {
              const res = await github.rest.repos.listForOrg({
                org,
                type: "public",
                sort: "updated",
                per_page,
                page
              });
              repos = repos.concat(res.data);
              if (res.data.length < per_page) break;
              page++;
            }
            // Format markdown list
            const lines = repos.map(repo =>
              `- [${repo.name}](${repo.html_url}): ${repo.description || '_No description_'}${repo.stargazers_count > 0 ? ` ⭐${repo.stargazers_count}` : ""}`
            );
            return lines.join("\n");

      - name: Update README.md with repo list
        env:
          OUT: ${{ steps.get-repos.outputs.result }}
        run: |
          FILE=profile/README.md
          awk -v out="$OUT" '
            /<!--START-REPO-LIST-->/ {print; print out; skip=1}
            /<!--END-REPO-LIST-->/ {skip=0}
            !skip
          ' "$FILE" > "$FILE.tmp"
          mv "$FILE.tmp" "$FILE"

      - name: Commit and push if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          if [[ -n $(git status -s) ]]; then
            git add profile/README.md
            git commit -m "chore: update org repo list in profile [auto]"
            git push
          fi
